<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFロック</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .step { display: none; }
    .step.active { display: block; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .step-badge {
      background: #4361ee;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .drop-zone {
      border: 2px dashed #c0c0c0;
      border-radius: 8px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafbfc;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #4361ee;
      background: #eef1ff;
    }
    .drop-zone p { color: #666; margin-bottom: 8px; }
    .drop-zone .hint { font-size: 12px; color: #999; }
    .file-list { margin-top: 16px; }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .size { color: #888; margin: 0 12px; font-size: 12px; white-space: nowrap; }
    .file-item .remove {
      background: none;
      border: none;
      color: #e63946;
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary { background: #4361ee; color: #fff; }
    .btn-primary:hover { background: #3a56d4; }
    .btn-primary:disabled { background: #b0b0b0; cursor: not-allowed; }
    .btn-success { background: #2d6a4f; color: #fff; }
    .btn-success:hover { background: #245a42; }
    .btn-outline { background: #fff; color: #4361ee; border: 2px solid #4361ee; }
    .btn-outline:hover { background: #eef1ff; }
    .btn-block { width: 100%; text-align: center; }
    .btn-group { display: flex; gap: 12px; margin-top: 16px; }
    .password-display {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      padding: 16px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
    }
    .password-display .pw {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
      flex: 1;
      color: #166534;
    }
    .copy-btn {
      padding: 8px 16px;
      background: #166534;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #14532d; }
    .info-box {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      font-size: 14px;
      color: #9a3412;
      line-height: 1.6;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group textarea { height: 120px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #4361ee;
      box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
    }
    .smtp-toggle {
      font-size: 13px;
      color: #4361ee;
      cursor: pointer;
      margin-bottom: 12px;
      display: inline-block;
    }
    .smtp-settings { display: none; margin-bottom: 16px; }
    .smtp-settings.show { display: block; }
    .smtp-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .status {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 14px;
    }
    .status.success { background: #f0fdf4; color: #166534; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .loading { display: none; text-align: center; padding: 24px; }
    .loading.show { display: block; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #4361ee;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reset-area { text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PDFロック</h1>
    <p class="subtitle">ファイルをパスワード付きZIPで安全に送付</p>

    <!-- Step 1: アップロード -->
    <div id="step1" class="step active">
      <div class="card">
        <h2><span class="step-badge">1</span>ファイルをアップロード</h2>
        <div id="dropZone" class="drop-zone">
          <p>ここにファイルをドラッグ&ドロップ</p>
          <p class="hint">または クリックしてファイルを選択（複数可）</p>
          <input type="file" id="fileInput" multiple style="display:none">
        </div>
        <div id="fileList" class="file-list"></div>
        <div class="btn-group" style="justify-content:center">
          <button id="lockBtn" class="btn btn-primary" disabled>ZIPロック</button>
        </div>
      </div>
      <div id="loadingLock" class="loading">
        <div class="spinner"></div>
        <p>ZIP作成中...</p>
      </div>
    </div>

    <!-- Step 2: ロック完了 -->
    <div id="step2" class="step">
      <div class="card">
        <h2><span class="step-badge">2</span>ZIPロック完了</h2>
        <div class="password-display">
          <span class="pw" id="passwordText"></span>
          <button class="copy-btn" id="copyPwBtn">コピー</button>
        </div>
        <div class="btn-group" style="justify-content:center">
          <button id="downloadBtn" class="btn btn-primary">ZIPをダウンロード</button>
        </div>
        <div class="info-box">
          ZIPファイルをメール等で相手に送付してください。<br>
          相手がファイルを受信したことを確認してから、下のステップでパスワードを送信してください。
        </div>
      </div>

      <div class="card">
        <h2><span class="step-badge">3</span>パスワードを送信</h2>
        <div class="form-group">
          <label>宛先メールアドレス</label>
          <input type="email" id="toEmail" placeholder="example@company.co.jp">
        </div>
        <div class="form-group">
          <label>メール本文（プレビュー）</label>
          <textarea id="mailBody" readonly></textarea>
        </div>
        <span class="smtp-toggle" id="smtpToggle">SMTP設定を表示 ▼</span>
        <div id="smtpSettings" class="smtp-settings">
          <div class="smtp-grid">
            <div class="form-group">
              <label>SMTPホスト</label>
              <input type="text" id="smtpHost" placeholder="smtp.gmail.com" value="smtp.gmail.com">
            </div>
            <div class="form-group">
              <label>ポート</label>
              <input type="number" id="smtpPort" placeholder="587" value="587">
            </div>
            <div class="form-group">
              <label>ユーザー名</label>
              <input type="text" id="smtpUser" placeholder="your@gmail.com">
            </div>
            <div class="form-group">
              <label>パスワード</label>
              <input type="password" id="smtpPass" placeholder="アプリパスワード">
            </div>
            <div class="form-group" style="grid-column: span 2">
              <label>送信元メールアドレス</label>
              <input type="email" id="fromEmail" placeholder="your@gmail.com">
            </div>
          </div>
        </div>
        <button id="sendPwBtn" class="btn btn-success btn-block">パスワードを送信</button>
        <div id="sendStatus"></div>
      </div>
      <div class="reset-area">
        <button id="resetBtn" class="btn btn-outline">新しいファイルをロック</button>
      </div>
    </div>
  </div>

  <script>
    let selectedFiles = [];
    let currentPassword = '';
    let currentZipFilename = '';
    let currentZipBase64 = '';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const lockBtn = document.getElementById('lockBtn');

    // ドラッグ&ドロップ
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => {
      addFiles(fileInput.files);
      fileInput.value = '';
    });

    function addFiles(filesList) {
      for (const f of filesList) {
        selectedFiles.push(f);
      }
      renderFileList();
    }

    function renderFileList() {
      fileList.innerHTML = '';
      selectedFiles.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
          <span class="name">${escapeHtml(f.name)}</span>
          <span class="size">${formatSize(f.size)}</span>
          <button class="remove" data-idx="${i}">&times;</button>
        `;
        div.querySelector('.remove').addEventListener('click', () => {
          selectedFiles.splice(i, 1);
          renderFileList();
        });
        fileList.appendChild(div);
      });
      lockBtn.disabled = selectedFiles.length === 0;
    }

    // ZIPロック
    lockBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      lockBtn.disabled = true;
      document.getElementById('loadingLock').classList.add('show');

      try {
        const formData = new FormData();
        for (const f of selectedFiles) {
          formData.append('files', f);
        }

        const res = await fetch('/api/lock', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        currentPassword = data.password;
        currentZipFilename = data.zipFilename;
        currentZipBase64 = data.zipBase64;

        document.getElementById('passwordText').textContent = currentPassword;
        updateMailBody();

        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
      } catch (err) {
        alert('ZIPロック失敗: ' + err.message);
        lockBtn.disabled = false;
      } finally {
        document.getElementById('loadingLock').classList.remove('show');
      }
    });

    // ZIPダウンロード（Base64からブラウザでダウンロード）
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const byteChars = atob(currentZipBase64);
      const byteNumbers = new Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) {
        byteNumbers[i] = byteChars.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      const blob = new Blob([byteArray], { type: 'application/zip' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = currentZipFilename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // パスワードコピー
    document.getElementById('copyPwBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(currentPassword).then(() => {
        const btn = document.getElementById('copyPwBtn');
        btn.textContent = 'コピー済み';
        setTimeout(() => btn.textContent = 'コピー', 2000);
      });
    });

    function updateMailBody() {
      document.getElementById('mailBody').value =
        `お世話になっております。\n\n先ほどお送りしたファイル（${currentZipFilename}）のパスワードをお知らせいたします。\n\nパスワード: ${currentPassword}\n\nお手数ですが、上記パスワードにてファイルを解凍してください。\nご不明な点がございましたら、お気軽にお問い合わせください。\n\nよろしくお願いいたします。`;
    }

    // SMTP設定トグル
    document.getElementById('smtpToggle').addEventListener('click', () => {
      const el = document.getElementById('smtpSettings');
      el.classList.toggle('show');
      document.getElementById('smtpToggle').textContent =
        el.classList.contains('show') ? 'SMTP設定を非表示 ▲' : 'SMTP設定を表示 ▼';
    });

    // パスワード送信
    document.getElementById('sendPwBtn').addEventListener('click', async () => {
      const to = document.getElementById('toEmail').value.trim();
      if (!to) return alert('宛先メールアドレスを入力してください');

      const btn = document.getElementById('sendPwBtn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      try {
        const res = await fetch('/api/send-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            to,
            zipFilename: currentZipFilename,
            password: currentPassword,
            smtpHost: document.getElementById('smtpHost').value,
            smtpPort: document.getElementById('smtpPort').value,
            smtpUser: document.getElementById('smtpUser').value,
            smtpPass: document.getElementById('smtpPass').value,
            fromEmail: document.getElementById('fromEmail').value
          })
        });
        const data = await res.json();
        const status = document.getElementById('sendStatus');
        if (res.ok) {
          status.className = 'status success';
          status.textContent = 'パスワードを送信しました';
        } else {
          throw new Error(data.error);
        }
      } catch (err) {
        const status = document.getElementById('sendStatus');
        status.className = 'status error';
        status.textContent = '送信失敗: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'パスワードを送信';
      }
    });

    // リセット
    document.getElementById('resetBtn').addEventListener('click', () => {
      selectedFiles = [];
      currentPassword = '';
      currentZipFilename = '';
      currentZipBase64 = '';
      fileList.innerHTML = '';
      lockBtn.disabled = true;
      document.getElementById('toEmail').value = '';
      document.getElementById('sendStatus').className = '';
      document.getElementById('sendStatus').textContent = '';
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
    });

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
